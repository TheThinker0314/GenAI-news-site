baseURL = 'https://genai-news.com/'
languageCode = 'en-us'
title = "GenAI News 2026 - The Leading Source for AI, Agents title = "GenAI News 2026 - The Latest in Artificial Intelligence, Agents & LLMs" LLMs"
theme = 'ananke'

description = "The ultimate guide to Generative AI, LLMs, and AI Agents in 2026. Daily news, tutorials, and breakthroughs."

enableRobotsTXT = true
enableGitInfo = true
summaryLength = 60

[params]
  customCSS = ["/css/custom.css"]
  keywords = ["AI News 2026", "Generative Models", "Generative AI", "AI news", "LLM", "machine learning", "artificial intelligence", "ChatGPT", "Tech Trends", "Deep Learning", "Claude", "Gemini", "AI startups", "OpenAI", "Anthropic", "AGI", "AI Agents", "2026 Tech News", "AI Breakthroughs", "AI Future 2026", "Generative AI News", "Prompt Engineering", "Multimodal AI", "AI Ethics", "Future AI 2026"]
  author = "GenAI News Editorial Team"
  description = "The ultimate guide to Generative AI, LLMs, and AI Agents in 2026. Daily news, tutorials, and breakthroughs."
  theme_color = '#121212'
  background_color_class = "bg-near-black"
  site_logo = "/images/logo.png"
  favicon = "/images/favicon.ico"
  env = "production"
  custom_css = ["css/seo-modern-design-2026-v24.css", "css/seo-modern-design-2026-v23.css", "css/seo-modern-design-2026-v22.css", "css/seo-modern-design-2026.css", "css/genai-premium-v104.css", "css/genai-seo-improved.css", "css/seo-modern-design-v30.css", "css/genai-premium-v105.css", "css/seo-modern-design-2026-v2.css", "css/seo-modern-design-2026-v3.css", "css/seo-modern-design-2026-v4.css", "css/seo-modern-design-2026-vfinal.css"]
  custom_js = ["js/custom.js"]
  googleAnalytics = "G-GENAINEWS123"
  rssLimit = 30

  [params.social]
    twitter = "GenAINewsHub"
    linkedin = "genai-news"

  [params.ananke]
    show_recent_posts = true

  [params.seo]
    images = ["images/og-image.jpg"]
    twitter_card = "summary_large_image"
    robots = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    opengraph = true
    schema = true
    canonicalUrl = true

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "News & Updates"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "Guides & Tutorials"
    url = "/guides/"
    weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "hourly"
  filename = "sitemap.xml"
  priority = 1.0

[taxonomies]
  category = "categories"
  tag = "tags"


