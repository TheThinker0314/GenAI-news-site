baseURL = 'https://genai-news.com/'
languageCode = 'en-us'
title = 'GenAI News Hub | Daily Generative AI Breakthroughs & LLM Trends'
theme = 'ananke'
enableRobotsTXT = true

[params]
  description = 'Your daily source for the latest breakthroughs, deep-dive analysis, and emerging trends in the world of Generative Artificial Intelligence, Large Language Models (LLMs), ChatGPT updates, and AI innovations. Covering OpenAI, Anthropic, Google, and more.'
  theme_color = '#3498db'
  keywords = ["Generative AI", "LLM", "ChatGPT", "AI News", "Machine Learning", "Tech Trends", "Deep Learning", "Artificial Intelligence", "AI Ethics", "Neural Networks", "AI Research", "Generative Models", "AI Startups", "Prompt Engineering", "OpenAI", "Anthropic", "Claude", "Gemini", "AI Business", "Future of Work", "AI Tools"]
  custom_css = ["css/custom.css"]
  background_color_class = "bg-near-black"
  author = "GenAI News Editorial Team"
  site_logo = "/images/logo.png"
  favicon = "/images/favicon.ico"
  env = "production"
  # SEO Enhancements
  images = ["images/og-image.jpg"]
  twitter_card = "summary_large_image"
  robots = "index, follow"
  opengraph = true
  schema = true
  canonicalUrl = true
  custom_js = ["js/custom.js"]
  googleAnalytics = "G-GENAINEWS123"
  rssLimit = 20
  [params.social]
    twitter = "GenAINews"
    linkedin = "genai-news"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "News & Updates"
    url = "/posts/"
    weight = 2

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "hourly"
  filename = "sitemap.xml"
  priority = 1.0

[taxonomies]
  category = "categories"
  tag = "tags"
