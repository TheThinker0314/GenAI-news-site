baseURL = 'https://genai-news.com/'
languageCode = 'en-us'
title = 'GenAI News Hub | Daily Generative AI Breakthroughs, LLM Trends & ChatGPT Updates'
theme = 'ananke'
enableRobotsTXT = true
enableGitInfo = true
summaryLength = 60

[params]
  description = 'Your daily source for the latest breakthroughs, deep-dive analysis, and emerging trends in the world of Generative Artificial Intelligence, Large Language Models (LLMs), ChatGPT updates, and AI innovations. Covering OpenAI, Anthropic, Google, and more. Stay ahead with expert AI insights.'
  theme_color = '#1b1b1b'
  keywords = ["Generative AI", "LLM", "ChatGPT", "AI News", "Machine Learning", "Tech Trends", "Deep Learning", "Artificial Intelligence", "AI Ethics", "Neural Networks", "AI Research", "Generative Models", "AI Startups", "Prompt Engineering", "OpenAI", "Anthropic", "Claude", "Gemini", "AI Business", "Future of Work", "AI Tools", "AI Tutorials", "AI Development"]
  meta_robots = "index,follow"
  custom_css = ["css/custom.css"]
  background_color_class = "bg-near-black"
  author = "GenAI News Editorial Team"
  site_logo = "/images/logo.png"
  favicon = "/images/favicon.ico"
  env = "production"
  # SEO Enhancements
  images = ["images/og-image.jpg"]
  twitter_card = "summary_large_image"
  robots = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
  opengraph = true
  schema = true
  canonicalUrl = true
  author_schema = true
  structured_data = true
  custom_js = ["js/custom.js"]
  googleAnalytics = "G-GENAINEWS123"
  rssLimit = 30
  [params.social]
    twitter = "GenAINews"
    linkedin = "genai-news"

[params.ananke]
  show_recent_posts = true

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "News & Updates"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "Guides & Tutorials"
    url = "/guides/"
    weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "hourly"
  filename = "sitemap.xml"
  priority = 1.0

[taxonomies]
  category = "categories"
  tag = "tags"

# seo_improvement='done'
