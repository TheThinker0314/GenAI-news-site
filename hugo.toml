baseURL = 'https://genai-news.com/'
languageCode = 'en-us'
title = "GenAI News - The Latest in Artificial Intelligence"
theme = 'ananke'

description = "Discover the future: Stay updated with the latest news, trends, and breakthroughs in Generative AI, LLMs, machine learning, and AI applications. Get premium AI & LLM updates for 2026."

enableRobotsTXT = true
enableGitInfo = true
summaryLength = 60

[params]
  keywords = ["AI News 2026", "Generative Models", "Generative AI", "AI news", "LLM", "machine learning", "artificial intelligence", "ChatGPT", "Tech Trends", "Deep Learning", "Claude", "Gemini", "AI startups", "OpenAI", "Anthropic", "AGI", "AI Agents", "2026 Tech News", "AI Breakthroughs", "AI Future 2026", "Generative AI News", "Prompt Engineering", "Multimodal AI", "AI Ethics"]
  author = "GenAI News Editorial Team"
  description = "Your daily source for the latest breakthroughs, deep-dive analysis, and emerging trends in the world of Generative Artificial Intelligence, Large Language Models (LLMs), ChatGPT updates, and AI innovations."
  theme_color = '#121212'
  background_color_class = "bg-near-black"
  site_logo = "/images/logo.png"
  favicon = "/images/favicon.ico"
  env = "production"
  custom_css = ["css/seo-modern-design-2026.css", "css/genai-premium-v104.css", "css/genai-seo-improved.css", "css/seo-modern-design-v30.css", "css/genai-premium-v105.css"]
  custom_js = ["js/custom.js"]
  googleAnalytics = "G-GENAINEWS123"
  rssLimit = 30

  [params.social]
    twitter = "GenAINewsHub"
    linkedin = "genai-news"

  [params.ananke]
    show_recent_posts = true

  [params.seo]
    images = ["images/og-image.jpg"]
    twitter_card = "summary_large_image"
    robots = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    opengraph = true
    schema = true
    canonicalUrl = true

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "News & Updates"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "Guides & Tutorials"
    url = "/guides/"
    weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "hourly"
  filename = "sitemap.xml"
  priority = 1.0

[taxonomies]
  category = "categories"
  tag = "tags"

