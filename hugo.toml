baseURL = 'https://genai-news.com/'
languageCode = 'en-us'
title = "GenAI News - Latest AI & LLM Updates & Insights"
theme = 'ananke'

description = "Stay updated with the latest news, trends, and breakthroughs in Generative AI, LLMs, machine learning, and AI applications."
keywords = ["Generative AI", "AI news", "LLM", "machine learning", "artificial intelligence", "ChatGPT", "Tech Trends", "Deep Learning", "Claude", "Gemini", "AI startups", "OpenAI", "Anthropic"]

enableRobotsTXT = true
enableGitInfo = true
summaryLength = 60

[params]
  author = "GenAI News Editorial Team"
  description = "Your daily source for the latest breakthroughs, deep-dive analysis, and emerging trends in the world of Generative Artificial Intelligence, Large Language Models (LLMs), ChatGPT updates, and AI innovations."
  theme_color = '#1b1b1b'
  background_color_class = "bg-near-black"
  site_logo = "/images/logo.png"
  favicon = "/images/favicon.ico"
  env = "production"
  custom_css = ["css/custom.css", "css/seo-improvements.css", "css/nav.css", "css/design-upgrade.css"]
  custom_js = ["js/custom.js"]
  googleAnalytics = "G-GENAINEWS123"
  rssLimit = 30

  [params.social]
    twitter = "GenAINewsHub"
    linkedin = "genai-news"

  [params.ananke]
    show_recent_posts = true

  [params.seo]
    images = ["images/og-image.jpg"]
    twitter_card = "summary_large_image"
    robots = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    opengraph = true
    schema = true
    canonicalUrl = true

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "News & Updates"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "Guides & Tutorials"
    url = "/guides/"
    weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "hourly"
  filename = "sitemap.xml"
  priority = 1.0

[taxonomies]
  category = "categories"
  tag = "tags"
