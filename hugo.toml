baseURL = 'https://genai-news.com/'
languageCode = 'en-us'
title = "GenAI News title = "GenAI News title = "GenAI News Site - The Latest in Generative AI" Insights" Insights"
Description = "Stay updated with the latest news, trends, and breakthroughs in Generative AI, LLMs, and machine learning."
Keywords = "Generative AI, AI news, LLM, machine learning, artificial intelligence"
Description = "Stay updated with the latest news, trends, and breakthroughs in Generative AI, LLMs, and machine learning."
Keywords = "Generative AI, AI news, LLM, machine learning, artificial intelligence"
theme = 'ananke'

description = "Stay updated with the latest news, trends, and breakthroughs in Generative AI, LLMs, and machine learning."
keywords = ["Generative AI", "AI news", "LLM", "machine learning", "artificial intelligence", "ChatGPT", "Tech Trends", "Deep Learning", "Claude", "Gemini", "AI startups", "OpenAI", "Anthropic"]

enableRobotsTXT = true
enableGitInfo = true
summaryLength = 60

[params]
  author = "GenAI News Editorial Team"
  description = "Your daily source for the latest breakthroughs, deep-dive analysis, and emerging trends in the world of Generative Artificial Intelligence, Large Language Models (LLMs), ChatGPT updates, and AI innovations. Covering OpenAI, Anthropic, Google, and more. Stay ahead with expert AI insights."
  theme_color = '#1b1b1b'
  background_color_class = "bg-near-black"
  site_logo = "/images/logo.png"
  favicon = "/images/favicon.ico"
  env = "production"
  custom_css = ["css/custom.css", "css/seo-improvements.css", "css/nav.css"]
  custom_js = ["js/custom.js"]
  googleAnalytics = "G-GENAINEWS123"
  rssLimit = 30

  [params.social]
    twitter = "GenAINewsHub"
    linkedin = "genai-news"

  [params.ananke]
    show_recent_posts = true

  [params.seo]
    images = ["images/og-image.jpg"]
    twitter_card = "summary_large_image"
    robots = "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    opengraph = true
    schema = true
    canonicalUrl = true
    enhanced = true
    amp_support = true
    brotli_compression = true
    cdn_integration = true
    mobile_friendly_design = true
    structured_data_json_ld = true
    core_web_vitals_optimized = true
    accessibility_contrast_ratio = "AAA"
    lazy_loading_images = true
    font_display_swap = true
    open_graph_locale = "en_US"
    twitter_site = "@GenAINewsHub"
    preload_fonts = true
    structured_data_organization = true
    voice_search_optimized = true
    ai_summaries_enabled = true
    alt_tags_enforced = true
    semantic_html5_structure = true
    improve_seo_more = true

  [params.design]
    primary_color = "#3498db"
    secondary_color = "#2c3e50"
    background_color = "#f9f9f9"
    text_color = "#333333"
    enable_breadcrumbs = true
    heading_font = "Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    body_font = "Roboto, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    dark_mode_toggle_enabled = true
    ui_hover_effects = true
    glassmorphism_ui = true
    typography_fluid_scaling = true
    semantic_nav_tags = true
    css_grid_layout = true
    flexbox_alignment = true
    aria_labels_completed = true
    design_modern_rounded_corners = true

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "News & Updates"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "Guides & Tutorials"
    url = "/guides/"
    weight = 3

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "hourly"
  filename = "sitemap.xml"
  priority = 1.0

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  customCSS = ["css/custom.css"]
