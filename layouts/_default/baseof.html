<!DOCTYPE html>
<html lang="{{ site.LanguageCode }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} - {{ site.Title }}{{ end }}</title>
    {{ partial "seo.html" . }}
    {{ partial "head-additions.html" . }}
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #f8fafc;
        color: #111827;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
      }
      .hover-scale { transition: transform 0.2s ease-in-out; }
      .hover-scale:hover { transform: scale(1.02); }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans antialiased min-h-screen flex flex-col">
    <header class="bg-gradient-to-r from-blue-700 to-indigo-800 text-white shadow-lg sticky top-0 z-50">
      <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
        <a href="/" class="text-3xl font-extrabold tracking-tight hover:text-blue-200 transition-colors">{{ site.Title }}</a>
        <nav class="space-x-6 text-lg font-medium">
          {{ range site.Menus.main }}
          <a href="{{ .URL }}" class="hover:text-blue-300 transition-colors border-b-2 border-transparent hover:border-blue-300 pb-1">{{ .Name }}</a>
          {{ end }}
        </nav>
      </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto px-4 py-10 w-full shadow-sm bg-white rounded-lg my-6 border border-gray-100">
      {{ block "main" . }}{{ end }}
    </main>

    <footer class="bg-gray-900 text-gray-400 py-8 text-center mt-auto">
      <div class="max-w-6xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center">
        <p class="mb-4 md:mb-0">&copy; {{ now.Format "2006" }} {{ site.Title }}. All rights reserved.</p>
        <div class="space-x-4">
          <a href="#" class="hover:text-white transition-colors">Privacy Policy</a>
          <a href="#" class="hover:text-white transition-colors">Terms of Service</a>
          <a href="#" class="hover:text-white transition-colors">Contact Us</a>
        </div>
      </div>
    </footer>
  </body>
</html>
