
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}">
<meta name="author" content="{{ site.Params.author }}">
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ .Permalink }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ .Title }}">
<meta name="theme-color" content="#1b1b1b">
<link rel="canonical" href="{{ .Permalink }}">
<style>
    :root {
        --bg-color: #f9f9f9;
        --text-color: #333;
        --primary-color: #3498db;
        --secondary-color: #2c3e50;
        --link-hover: #2980b9;
        --card-bg: #fff;
    }
    @media (prefers-color-scheme: dark) {
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --primary-color: #4da8da;
            --secondary-color: #bdc3c7;
            --link-hover: #76c7c0;
            --card-bg: #1e1e1e;
        }
    }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.7; color: var(--text-color); background-color: var(--bg-color); max-width: 1200px; margin: 0 auto; padding: 20px; transition: background-color 0.3s, color 0.3s; }
    h1, h2, h3, h4 { color: var(--secondary-color); font-weight: 600; line-height: 1.3; }
    a { color: var(--primary-color); text-decoration: none; transition: color 0.2s ease-in-out; }
    a:hover { color: var(--link-hover); text-decoration: underline; }
    header { border-bottom: 2px solid rgba(128, 128, 128, 0.2); padding-bottom: 20px; margin-bottom: 40px; }
    .post { margin-bottom: 40px; background: var(--card-bg); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s, box-shadow 0.2s; }
    .post:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
    .post-title { font-size: 1.8em; margin-bottom: 12px; margin-top: 0; }
    .post-meta { color: #888; font-size: 0.9em; margin-bottom: 15px; }
    img { max-width: 100%; height: auto; border-radius: 8px; }
</style>
