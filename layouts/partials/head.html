
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}">
<meta name="author" content="{{ site.Params.author }}">
<meta name="robots" content="{{ with .Params.robots }}{{ . }}{{ else }}{{ site.Params.robots }}{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ .Title }}">
<style>
    :root { --primary: #2563eb; --text: #1f2937; --bg: #ffffff; --surface: #f3f4f6; }
    @media (prefers-color-scheme: dark) { :root { --primary: #3b82f6; --text: #f9fafb; --bg: #111827; --surface: #1f2937; } }
    body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.6; color: var(--text); background: var(--bg); max-width: 1200px; margin: 0 auto; padding: 2rem; }
    h1, h2, h3 { color: var(--text); line-height: 1.2; }
    a { color: var(--primary); text-decoration: none; transition: opacity 0.2s; }
    a:hover { opacity: 0.8; text-decoration: underline; }
    header { border-bottom: 2px solid var(--surface); padding-bottom: 2rem; margin-bottom: 3rem; }
    .post { margin-bottom: 3rem; background: var(--surface); padding: 2rem; border-radius: 0.5rem; }
    .post-title { font-size: 1.75rem; margin-bottom: 0.5rem; }
    .post-meta { font-size: 0.875rem; opacity: 0.8; }
</style>
