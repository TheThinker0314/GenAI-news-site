
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}">
<meta name="author" content="{{ site.Params.author }}">
<link rel="canonical" href="{{ .Permalink }}">
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ .Permalink }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ .Title }}">
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}">
<style>
    :root {
      --primary-color: #2c3e50;
      --link-color: #2980b9;
      --bg-color: #fafafa;
      --text-color: #222;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: var(--text-color); background: var(--bg-color); max-width: 1200px; margin: 0 auto; padding: 20px; }
    h1, h2, h3, h4 { color: var(--primary-color); font-weight: 600; }
    a { color: var(--link-color); text-decoration: none; transition: color 0.2s; }
    a:hover, a:focus { color: #1c5980; text-decoration: underline; }
    header { border-bottom: 2px solid #eaeaea; padding-bottom: 20px; margin-bottom: 30px; display: flex; flex-direction: column; align-items: flex-start; }
    .post { margin-bottom: 40px; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .post-title { font-size: 1.75em; margin-bottom: 10px; }
    .post-meta { color: #555; font-size: 0.9em; display: block; margin-bottom: 15px; }
    img { max-width: 100%; height: auto; border-radius: 4px; }
    @media (max-width: 768px) { body { padding: 15px; } .post-title { font-size: 1.5em; } }
</style>
