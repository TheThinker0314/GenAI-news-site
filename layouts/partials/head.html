<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ site.Params.description }}{{ end }}">
<meta name="robots" content="{{ if .Params.robots }}{{ .Params.robots }}{{ else }}{{ site.Params.robots }}{{ end }}">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}">
<meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ site.Params.description }}{{ end }}">
{{ with .Params.image }}<meta property="og:image" content="{{ . | absURL }}">{{ else }}
{{ with site.Params.images }}<meta property="og:image" content="{{ index . 0 | absURL }}">{{ end }}{{ end }}

<!-- Twitter -->
<meta property="twitter:card" content="{{ site.Params.twitter_card | default "summary_large_image" }}">
<meta property="twitter:url" content="{{ .Permalink }}">
<meta property="twitter:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}">
<meta property="twitter:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ site.Params.description }}{{ end }}">
{{ with .Params.image }}<meta property="twitter:image" content="{{ . | absURL }}">{{ else }}
{{ with site.Params.images }}<meta property="twitter:image" content="{{ index . 0 | absURL }}">{{ end }}{{ end }}

<link rel="canonical" href="{{ .Permalink }}">
{{ hugo.Generator }}
