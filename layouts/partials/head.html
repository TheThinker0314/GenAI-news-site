
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}">
<meta name="author" content="{{ site.Params.author }}">
<meta name="robots" content="{{ with .Params.robots }}{{ . }}{{ else }}{{ site.Params.robots }}{{ end }}">
<link rel="canonical" href="{{ .Permalink }}">
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ .Title }}">
<style>
    :root { 
      --primary: #3b82f6; 
      --primary-hover: #2563eb;
      --text: #1f2937; 
      --text-muted: #4b5563;
      --bg: #ffffff; 
      --surface: #f9fafb; 
      --border: #e5e7eb;
      --radius: 0.75rem;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    @media (prefers-color-scheme: dark) { 
      :root { 
        --primary: #60a5fa; 
        --primary-hover: #93c5fd;
        --text: #f9fafb; 
        --text-muted: #9ca3af;
        --bg: #0f172a; 
        --surface: #1e293b; 
        --border: #334155;
        --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
      } 
    }
    body { 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      line-height: 1.6; 
      color: var(--text); 
      background: var(--bg); 
      max-width: 1200px; 
      margin: 0 auto; 
      padding: 2rem; 
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3 { 
      color: var(--text); 
      line-height: 1.2; 
      font-weight: 700;
      letter-spacing: -0.025em;
    }
    a { 
      color: var(--primary); 
      text-decoration: none; 
      transition: all 0.2s ease; 
    }
    a:hover { 
      color: var(--primary-hover); 
      text-decoration: underline; 
    }
    header { 
      border-bottom: 1px solid var(--border); 
      padding-bottom: 2rem; 
      margin-bottom: 3rem; 
    }
    .post { 
      margin-bottom: 3rem; 
      background: var(--surface); 
      padding: 2rem; 
      border-radius: var(--radius); 
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .post:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    }
    .post-title { 
      font-size: 1.875rem; 
      margin-bottom: 0.75rem; 
    }
    .post-meta { 
      font-size: 0.875rem; 
      color: var(--text-muted);
      display: flex;
      gap: 1rem;
      align-items: center;
    }
</style>

<!-- JSON-LD Schema.org SEO -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "{{ if .IsPage }}Article{{ else }}WebSite{{ end }}",
  "headline": "{{ .Title }}",
  "name": "{{ site.Title }}",
  "url": "{{ .Permalink }}",
  "description": "{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}",
  "publisher": {
    "@type": "Organization",
    "name": "{{ site.Title }}"
  }
}
</script>
