<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <meta name="keywords" content="{{ if .Params.tags }}{{ delimit .Params.tags ", " }}{{ else }}{{ delimit .Site.Params.keywords ", " }}{{ end }}">
    <meta name="theme-color" content="{{ .Site.Params.theme_color }}">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
    <meta property="og:url" content="{{ .Permalink }}">
    <meta property="og:title" content="{{ .Title }}">
    <meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    {{ with .Params.images }}<meta property="og:image" content="{{ index . 0 | absURL }}">{{ else }}{{ if .Site.Params.images }}<meta property="og:image" content="{{ index .Site.Params.images 0 | absURL }}">{{ end }}{{ end }}

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="{{ .Permalink }}">
    <meta property="twitter:title" content="{{ .Title }}">
    <meta property="twitter:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    {{ with .Params.images }}<meta property="twitter:image" content="{{ index . 0 | absURL }}">{{ else }}{{ if .Site.Params.images }}<meta property="twitter:image" content="{{ index .Site.Params.images 0 | absURL }}">{{ end }}{{ end }}

    <!-- JSON-LD Structured Data -->
    {{ if .IsPage }}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": "{{ .Title | plainify }}",
      "description": "{{ if .Description }}{{ .Description | plainify }}{{ else }}{{ .Site.Params.description | plainify }}{{ end }}",
      "author": {
        "@type": "Person",
        "name": "{{ .Site.Params.author }}"
      },
      "publisher": {
        "@type": "Organization",
        "name": "{{ .Site.Title }}"
      },
      "datePublished": "{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}",
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ .Permalink }}"
      }
    }
    </script>
    {{ end }}

    <link rel="canonical" href="{{ .Permalink }}">
    {{ hugo.Generator }}
    <link rel="stylesheet" href="/css/custom.css">
    
    <!-- Google Analytics -->
    {{ if .Site.Params.googleAnalytics }}
    <script async src="https://www.googletagmanager.com/gtag/js?id={{ .Site.Params.googleAnalytics }}"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '{{ .Site.Params.googleAnalytics }}');
    </script>
    {{ end }}
</head>
