
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}">
<meta name="author" content="{{ site.Params.author }}">
<meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
<meta name="googlebot" content="index, follow">
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}">
<meta property="og:type" content="website">
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 1200px; margin: 0 auto; padding: 20px; background-color: #fafafa; }
    h1, h2, h3 { color: #2c3e50; }
    a { color: #3498db; text-decoration: none; font-weight: bold; }
    a:hover { text-decoration: underline; color: #2980b9; }
    header { border-bottom: 3px solid #3498db; padding-bottom: 20px; margin-bottom: 30px; }
    .post { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 40px; }
    .post-title { font-size: 1.8em; margin-bottom: 10px; color: #2c3e50; }
    .post-meta { color: #7f8c8d; font-size: 0.9em; margin-bottom: 15px; }
</style>
