<meta name="description" content="{{ if .IsHome }}{{ site.Params.description }}{{ else }}{{ .Description | default .Summary | plainify | truncate 160 }}{{ end }}" />
<meta name="keywords" content="{{ if .Params.tags }}{{ delimit .Params.tags ", " }}{{ else }}{{ delimit site.Params.keywords ", " }}{{ end }}" />
<link rel="canonical" href="{{ .Permalink }}" />

<!-- Open Graph -->
<meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}" />
<meta property="og:description" content="{{ if .IsHome }}{{ site.Params.description }}{{ else }}{{ .Description | default .Summary | plainify | truncate 160 }}{{ end }}" />
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}" />
<meta property="og:url" content="{{ .Permalink }}" />
{{ if .Params.image }}
<meta property="og:image" content="{{ .Params.image | absURL }}" />
{{ else }}
<meta property="og:image" content="{{ "/images/og-image.jpg" | absURL }}" />
{{ end }}
<meta property="og:site_name" content="{{ site.Title }}" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}" />
<meta name="twitter:description" content="{{ if .IsHome }}{{ site.Params.description }}{{ else }}{{ .Description | default .Summary | plainify | truncate 160 }}{{ end }}" />
{{ if .Params.image }}
<meta name="twitter:image" content="{{ .Params.image | absURL }}" />
{{ else }}
<meta name="twitter:image" content="{{ "/images/og-image.jpg" | absURL }}" />
{{ end }}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "{{ if .IsPage }}Article{{ else }}WebSite{{ end }}",
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": "{{ .Permalink }}"
  },
  "headline": "{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }}{{ end }}",
  "description": "{{ if .IsHome }}{{ site.Params.description }}{{ else }}{{ .Description | default .Summary | plainify | truncate 160 }}{{ end }}",
  "url": "{{ .Permalink }}",
  "author": {
    "@type": "Organization",
    "name": "{{ site.Params.author }}"
  },
  "publisher": {
    "@type": "Organization",
    "name": "{{ site.Title }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ site.Params.site_logo | absURL }}"
    }
  }
}
</script>
