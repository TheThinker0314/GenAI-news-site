<!-- layouts/partials/seo.html -->
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}">
<meta name="author" content="{{ with .Params.author }}{{ . }}{{ else }}{{ site.Params.author }}{{ end }}">
<meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">

<!-- Open Graph meta tags -->
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}">
<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ site.Title }}">
{{ if .Params.images }}
{{ range first 6 .Params.images }}
<meta property="og:image" content="{{ . | absURL }}">
{{ end }}
{{ else if site.Params.images }}
{{ range first 6 site.Params.images }}
<meta property="og:image" content="{{ . | absURL }}">
{{ end }}
{{ end }}

<!-- Twitter Card meta tags -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:site" content="@{{ site.Params.social.twitter | default "genainews" }}">
<meta name="twitter:title" content="{{ .Title }}">
<meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with site.Params.description }}{{ . }}{{ end }}{{ end }}">
{{ if .Params.images }}
<meta name="twitter:image" content="{{ index .Params.images 0 | absURL }}">
{{ else if site.Params.images }}
<meta name="twitter:image" content="{{ index site.Params.images 0 | absURL }}">
{{ end }}
